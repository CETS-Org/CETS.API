name: .NET CI - Build and Test CETS.API

on:
  push:
    branches: [ develop, staging, main, dev_minhdq ]
  pull_request:
    branches: [ develop, staging, main, dev_minhdq ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout API repo into ./main-repo
      - name: Checkout API repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      # 2) Checkout Core repo into ./main-repo/core-repo  
      - name: Checkout CETS.Core repo
        uses: actions/checkout@v4
        with:
          repository: CETS-Org/CETS.Core
          path: main-repo/core-repo
          token: ${{ secrets.GH_PAT }}

      # 3) .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 4) Debug: show layout & current solution projects
      - name: Debug layout
        run: |
          echo "PWD: $(pwd)"
          echo "Top:"
          ls -la
          echo "main-repo:"
          ls -la main-repo
          echo "main-repo/core-repo:"
          ls -la main-repo/core-repo
          echo "Solutions found:"
          find main-repo -maxdepth 2 -name "*.sln" -print || true

      # 5) Remove any old Core entries from solution
      - name: Clean old Core refs in solution
        working-directory: ./main-repo
        run: |
          dotnet sln CETS.API.sln list || true
          OLD=$(dotnet sln CETS.API.sln list | grep -E "CETS\.Core|core-repo" || true)
          if [ -n "$OLD" ]; then
            echo "Removing old entries:"
            echo "$OLD"
            # Remove line-by-line (ignore errors)
            while IFS= read -r p; do dotnet sln CETS.API.sln remove "$p" || true; done <<< "$OLD"
          fi

      # 6) Add Core projects from ./core-repo into the solution
      - name: Add Core projects to solution
        working-directory: ./main-repo
        run: |
          CORE_PROJECTS=$(find ./core-repo -maxdepth 2 -name '*.csproj')
          if [ -z "$CORE_PROJECTS" ]; then
            echo "No Core projects found under ./core-repo"; exit 1
          fi
          echo "Adding projects:"
          echo "$CORE_PROJECTS"
          dotnet sln CETS.API.sln add $CORE_PROJECTS
          echo "Solution content after add:"
          dotnet sln CETS.API.sln list

      # 7) Normalize ProjectReference paths to ../core-repo/*
      - name: Update ProjectReference paths in .csproj
        working-directory: ./main-repo
        run: |
          set -e
          for file in $(find . -type f -name "*.csproj" ! -path "./.git/*"); do
            echo "Processing $file"
            # Replace Windows-style ..\..\CETS.Core\... with ../core-repo/...
            sed -i 's|\.\.\\\.\.\\CETS\.Core\\|../core-repo/|g' "$file"
            # Replace Unix-style ../../CETS.Core/... with ../core-repo/...
            sed -i 's|\.\./\.\./CETS\.Core/|../core-repo/|g' "$file"
            # Normalize any backslashes that remain
            sed -i 's|\\|/|g' "$file"
          done
          echo "Preview references that point to core-repo:"
          grep -R "\"../core-repo/" -n || true

      # 8) Restore
      - name: Restore
        working-directory: ./main-repo
        run: dotnet restore CETS.API.sln

      # 9) Build
      - name: Build
        working-directory: ./main-repo
        run: dotnet build CETS.API.sln -c Release --no-restore

      # 10) Test (if tests exist in the solution)
      - name: Test
        working-directory: ./main-repo
        run: dotnet test CETS.API.sln --no-build --verbosity normal
