name: .NET CI - Build and Test CETS.API

on:
  push:
    branches: [ develop, staging, main, dev_minhdq ]
  pull_request:
    branches: [ develop, staging, main, dev_minhdq ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout API repo into ./main-repo
      - name: Checkout API repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      # 2) Checkout Core repo into ./main-repo/core-repo
      - name: Checkout CETS.Core repo
        uses: actions/checkout@v4
        with:
          repository: CETS-Org/CETS.Core
          path: main-repo/core-repo
          token: ${{ secrets.GH_PAT }}

      # 3) .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 4) Debug layout
      - name: Debug layout
        run: |
          echo "PWD: $(pwd)"
          ls -la
          ls -la main-repo
          ls -la main-repo/core-repo
          find main-repo -maxdepth 2 -name "*.sln" -print || true

      # 5) Clean solution entries for Core (best effort)
      - name: Clean old Core refs in solution
        working-directory: ./main-repo
        run: |
          dotnet sln CETS.API.sln list || true
          OLD=$(dotnet sln CETS.API.sln list | grep -E "CETS\.Core|core-repo" || true)
          if [ -n "$OLD" ]; then
            while IFS= read -r p; do dotnet sln CETS.API.sln remove "$p" || true; done <<< "$OLD"
          fi

      # 6) Add Core projects to solution (so they build)
      - name: Add Core projects to solution
        working-directory: ./main-repo
        run: |
          CORE_PROJECTS=$(find ./core-repo -maxdepth 2 -name '*.csproj')
          [ -z "$CORE_PROJECTS" ] && { echo "No Core projects found"; exit 1; }
          dotnet sln CETS.API.sln add $CORE_PROJECTS
          dotnet sln CETS.API.sln list

      # 7) Ensure CETS.API.Web has project references to DTOs/Services/Utils
      - name: Force Web project references to Core
        working-directory: ./main-repo
        run: |
          WEB=./CETS.API.Web/CETS.API.Web.csproj
          dotnet remove "$WEB" reference ../core-repo/DTOs/DTOs.csproj 2>/dev/null || true
          dotnet remove "$WEB" reference ../core-repo/Services/Services.csproj 2>/dev/null || true
          dotnet remove "$WEB" reference ../core-repo/Utils/Utils.csproj 2>/dev/null || true
          dotnet add "$WEB" reference ../core-repo/DTOs/DTOs.csproj
          dotnet add "$WEB" reference ../core-repo/Services/Services.csproj
          dotnet add "$WEB" reference ../core-repo/Utils/Utils.csproj
          echo "Current Web project references:"
          dotnet list "$WEB" reference

      # 8) (Optional) Normalize any lingering paths in csproj files
      - name: Normalize ProjectReference paths
        working-directory: ./main-repo
        run: |
          for file in $(find . -type f -name "*.csproj" ! -path "./.git/*"); do
            sed -i 's|\.\.\\\.\.\\CETS\.Core\\|../core-repo/|g' "$file"
            sed -i 's|\.\./\.\./CETS\.Core/|../core-repo/|g' "$file"
            sed -i 's|\\|/|g' "$file"
          done
          grep -R "\"../core-repo/" -n || true

      # 9) Clean/Restore/Build/Test
      - name: Clean bin/obj
        working-directory: ./main-repo
        run: |
          find . -type d -name bin -o -name obj | xargs rm -rf || true

      - name: Restore
        working-directory: ./main-repo
        run: dotnet restore CETS.API.sln

      - name: Build
        working-directory: ./main-repo
        run: dotnet build CETS.API.sln -c Release --no-restore

      - name: Test
        working-directory: ./main-repo
        run: dotnet test CETS.API.sln --no-build --verbosity normal
